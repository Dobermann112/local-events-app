version: "3.9"

services:
  db:
    image: postgres:16
    container_name: local-events-app-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: local_events_app
    ports:
      - "5433:5432"
    volumes:
      - local-events-db-data:/var/lib/postgresql/data

volumes:
  local-events-db-data: